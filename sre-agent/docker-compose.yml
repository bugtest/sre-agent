# SRE Agent Docker Compose
# 用于本地测试和开发环境

version: '3.8'

services:
  # SRE Agent 主服务
  sre-agent:
    build: .
    container_name: sre-agent
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://sre_user:sre_password@mysql:3306/sre_db
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - KUBECONFIG=/root/.kube/config
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src:ro
      - ~/.kube/config:/root/.kube/config:ro
    depends_on:
      mysql:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - sre-network
    restart: unless-stopped

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: sre-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=sre_db
      - MYSQL_USER=sre_user
      - MYSQL_PASSWORD=sre_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - sre-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sre_user", "-psre_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sre-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - sre-network
    restart: unless-stopped

  # Loki 日志
  loki:
    image: grafana/loki:2.9.0
    container_name: sre-loki
    volumes:
      - ./deploy/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - sre-network
    restart: unless-stopped

  # Grafana 可视化（可选）
  grafana:
    image: grafana/grafana:10.0.0
    container_name: sre-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - sre-network
    restart: unless-stopped

networks:
  sre-network:
    driver: bridge

volumes:
  mysql-data:
  prometheus-data:
  loki-data:
  grafana-data:
